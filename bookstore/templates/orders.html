{% extends "base.html" %}
{% block title %}Заказы{% endblock %}
{% block content %}
<h1>Ваши заказы</h1>
{% if orders %}
<ul>
    {% for order in orders %}
    <li>Заказ #{{ order.id }} — {{ order.created_at.strftime("%d.%m.%Y") }}</li>
    {% endfor %}
</ul>
{% else %}
<p>Заказов пока нет.</p>
{% endif %}
{% endblock %}
