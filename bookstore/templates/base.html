<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Bookstore{% endblock %}</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<header>
    <div><a href="{{ url_for('main.index') }}">Bookstore</a></div>
    <nav>
        <a href="{{ url_for('catalog.catalog_index') }}">Каталог</a>
        <a href="{{ url_for('cart.view_cart') }}">Корзина</a>
        <a href="{{ url_for('orders.orders') }}">Заказы</a>
        {% if current_user.is_authenticated %}
            <a href="{{ url_for('auth.logout') }}">Выйти</a>
        {% else %}
            <a href="{{ url_for('auth.login') }}">Войти</a>
        {% endif %}
    </nav>
</header>
<main>
    {% block content %}{% endblock %}
</main>
</body>
</html>
