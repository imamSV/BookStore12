<!DOCTYPE html>
<html>
<head>

<title>{% block title %}Bookstore{% endblock %}</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="nav">

<a href="{{ url_for('main.index') }}">Главная</a>

<a href="{{ url_for('catalog.catalog_index') }}">Каталог</a>

{% if current_user.is_authenticated %}

<a href="{{ url_for('cart.view_cart') }}">Корзина</a>

<a href="{{ url_for('orders.orders') }}">Заказы</a>

<a href="{{ url_for('auth.logout') }}">Выйти</a>

{% else %}

<a href="{{ url_for('auth.login') }}">Войти</a>

<a href="{{ url_for('auth.register') }}">Регистрация</a>

{% endif %}

</div>

<div class="container">

{% with messages = get_flashed_messages() %}
{% if messages %}
{% for msg in messages %}
<p>{{ msg }}</p>
{% endfor %}
{% endif %}
{% endwith %}

{% block content %}{% endblock %}

</div>

</body>
</html>
