{% extends "base.html" %}

{% block content %}

<h1>{{ book.title }}</h1>

<img src="{{ book.cover_url }}" width="200">

<p><b>Автор:</b> {{ book.author }}</p>
<p><b>Год:</b> {{ book.year }}</p>
<p><b>Цена:</b> {{ book.price }} ₽</p>

<p>{{ book.description }}</p>

<p><b>Рейтинг:</b> {{ book.rating or 0 }} ⭐</p>

<form action="{{ url_for('cart.add_to_cart', book_id=book.id) }}" method="POST">
    <button type="submit">Добавить в корзину</button>
</form>

{% if current_user.is_authenticated %}

<h3>Оставить отзыв</h3>

<form action="{{ url_for('reviews.add_review', book_id=book.id) }}" method="POST">

<label>Рейтинг</label>
<select name="rating">
<option value="5">5</option>
<option value="4">4</option>
<option value="3">3</option>
<option value="2">2</option>
<option value="1">1</option>
</select>

<br>

<label>Отзыв</label>
<textarea name="text"></textarea>

<br>

<button type="submit">Отправить</button>

</form>

{% endif %}

{% endblock %}
